<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sovereign Discovery Tool</title>
    <script type="text/javascript" src="https://cdn.jsdelivr.net/npm/@emailjs/browser@3/dist/email.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=Montserrat:wght@300;400;600&family=Pinyon+Script&display=swap" rel="stylesheet">
    <style>
        :root { --earth: #0d160f; --gold: #c2a878; --cream: #fefae0; }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: 'Montserrat', sans-serif; background-color: var(--earth); color: var(--cream);
            line-height: 1.8; min-height: 100vh; display: flex; align-items: center; justify-content: center;
            background-image: radial-gradient(circle at 100% 100%, rgba(58, 90, 64, 0.12) 0%, transparent 40%);
        }
        .vertical-brand {
            position: fixed; height: 100vh; width: 60px; top: 0; display: flex; align-items: center; justify-content: center;
            font-family: 'Pinyon Script', cursive; font-size: 1.8rem; color: var(--gold); opacity: 0.2;
            writing-mode: vertical-rl; text-orientation: mixed; letter-spacing: 8px;
        }
        .left-brand { left: 20px; transform: rotate(180deg); }
        .right-brand { right: 20px; }
        .container {
            width: 95%; max-width: 750px; background: rgba(255, 255, 255, 0.01); backdrop-filter: blur(30px);
            border: 1px solid rgba(194, 168, 120, 0.15); padding: 70px 45px; position: relative; z-index: 10;
        }
        .quiz-title { font-size: 0.75rem; text-transform: uppercase; letter-spacing: 8px; color: var(--gold); text-align: center; display: block; margin-bottom: 40px; }
        h2 { font-family: 'Playfair Display', serif; font-size: 2rem; margin-bottom: 35px; text-align: center; font-weight: 400; }
        .quiz-step { display: none; }
        .quiz-step.active { display: block; animation: fadeIn 0.5s ease; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
        .option-btn {
            display: block; width: 100%; padding: 22px 30px; margin-bottom: 15px; background: transparent;
            border: 1px solid rgba(194, 168, 120, 0.2); color: var(--cream); cursor: pointer; text-align: left;
            font-size: 1rem; transition: 0.3s;
        }
        .option-btn:hover { background: rgba(194, 168, 120, 0.05); border-color: var(--gold); padding-left: 40px; }
        input[type="email"] { width: 100%; padding: 22px; background: transparent; border: 1px solid var(--gold); color: white; margin-bottom: 25px; text-align: center; border-radius: 0; }
        .action-btn { background: var(--gold); color: var(--earth); padding: 20px 40px; border: none; font-weight: 700; text-transform: uppercase; cursor: pointer; width: 100%; letter-spacing: 3px; }
        .result-title { font-family: 'Pinyon Script', cursive; font-size: 3.5rem; color: var(--gold); text-align: center; margin-bottom: 20px; line-height: 1; }
        .insight-card { background: rgba(194, 168, 120, 0.03); padding: 30px; margin: 20px 0; border: 1px solid rgba(194, 168, 120, 0.1); border-left: 4px solid var(--gold); }
        .roadmap-list { text-align: left; margin: 20px 0; list-style: none; }
        .roadmap-list li { margin-bottom: 15px; }
        .step-label { color: var(--gold); font-weight: 600; text-transform: uppercase; font-size: 0.8rem; letter-spacing: 1px; display: block; }
    </style>
</head>
<body>

<div class="vertical-brand left-brand">SOVEREIGN SEER</div>
<div class="vertical-brand right-brand">SOVEREIGN SEER</div>

<div class="container">
    <span class="quiz-title">Sovereign Discovery Tool</span>
    <div id="quiz-container">
        <div class="quiz-step active" id="step1">
            <h2>When you walk into a room, what do you notice first?</h2>
            <button class="option-btn" onclick="nextStep(2, 2)">The "vibe" or underlying tension that no one is talking about.</button>
            <button class="option-btn" onclick="nextStep(2, 1)">The physical decor and where people are standing.</button>
            <button class="option-btn" onclick="nextStep(2, 0)">I'm usually focused on making sure everyone likes me.</button>
        </div>
        <div class="quiz-step" id="step2">
            <h2>In our framework, what does <b>Worth as a Frequency</b> mean to you?</h2>
            <button class="option-btn" onclick="nextStep(3, 2)">My value is inherent and radiates from within.</button>
            <button class="option-btn" onclick="nextStep(3, 1)">I should try to be "high-vibe" so good things happen.</button>
            <button class="option-btn" onclick="nextStep(3, 0)">I have to earn my worth through work and helping others.</button>
        </div>
        <div class="quiz-step" id="step3">
            <h2>How do you handle a "Mental Fog"—feeling stuck or unheard?</h2>
            <button class="option-btn" onclick="nextStep(4, 2)">I pause and look for the distortion causing the block.</button>
            <button class="option-btn" onclick="nextStep(4, 1)">I push through and work harder to get noticed.</button>
            <button class="option-btn" onclick="nextStep(4, 0)">I vent to others and hope it goes away.</button>
        </div>
        <div class="quiz-step" id="step4">
            <h2>The Lens is focusing...</h2>
            <input type="email" id="userEmail" placeholder="Enter your email address">
            <button class="action-btn" id="submitBtn" onclick="processFinal()">Reveal My Path</button>
        </div>
        <div class="quiz-step" id="results">
            <div id="resultContent"></div>
        </div>
    </div>
</div>

<script>
    // 1. PLACE YOUR PUBLIC KEY HERE
    (function(){ emailjs.init("YOUR_PUBLIC_KEY"); })();

    let totalScore = 0;
    window.nextStep = function(stepNum, points) {
        totalScore += points;
        document.querySelectorAll('.quiz-step').forEach(s => s.classList.remove('active'));
        document.getElementById('step' + stepNum).classList.add('active');
    };

    window.processFinal = function() {
        const email = document.getElementById('userEmail').value;
        if(!email.includes('@')) { alert("Please provide a valid email."); return; }
        
        document.getElementById('submitBtn').innerText = "Tuning Frequency...";
        let category = totalScore >= 5 ? "The Emerging Sovereign" : (totalScore >= 3 ? "The Seeking Seer" : "The Sheltered Seer");
        let readiness = totalScore >= 3 ? "Ready" : "Preparing";

        // 2. PLACE YOUR TEMPLATE ID HERE
        emailjs.send("service_0djjn9q", "YOUR_TEMPLATE_ID", {
            to_email: email,
            category_result: category,
            readiness_level: readiness,
            reply_to: "thewellnessforest@gmail.com"
        }).then(function() {
            showFinalResults(category);
        }, function(err) {
            console.error("Failed", err);
            showFinalResults(category); 
        });
    };

    function showFinalResults(cat) {
        document.getElementById('step4').classList.remove('active');
        document.getElementById('results').classList.add('active');
        
        let insight = "", stepsHtml = "";

        if (cat === "The Emerging Sovereign") {
            insight = "You are already holding a high level of Inner Accuracy. You perceive the patterns that run the world. Your frequency is stabilizing.";
            stepsHtml = `<ul class="roadmap-list">
                <li><span class="step-label">Step 1: Observation</span>Spend 24 hours watching dynamics without correcting them. Witness the pattern.</li>
                <li><span class="step-label">Step 2: Frequency Audit</span>Mark every place where you say 'Yes' while your body says 'No.' This is where your frequency leaks.</li>
                <li><span class="step-label">Step 3: Trust Your Hit</span>Act on your first hit of accuracy today without seeking external validation.</li>
            </ul>`;
        } else if (cat === "The Seeking Seer") {
            insight = "You have caught glimpses of the truth, but the Harmony Lie is still dimming your sight. You are seeking validation for an internal knowing.";
            stepsHtml = `<ul class="roadmap-list">
                <li><span class="step-label">Step 1: The Silence Audit</span>Practice making one decision today without explaining it to anyone. Let it stand in silence.</li>
                <li><span class="step-label">Step 2: Worth Shift</span>Pause for 60 seconds every time you feel the need to 'do' to be valuable.</li>
                <li><span class="step-label">Step 3: Boundary Anchor</span>Say 'No' once today without providing an apology or a reason.</li>
            </ul>`;
        } else {
            insight = "Your Sight is clouded by Mental Fog. You are likely operating from Worth as a Transaction—feeling you must prove yourself to be safe.";
            stepsHtml = `<ul class="roadmap-list">
                <li><span class="step-label">Step 1: Nervous System Regulation</span>Spend 20 minutes in silence daily before checking your phone. Recalibrate the vessel.</li>
                <li><span class="step-label">Step 2: Radical Silence</span>Stop explaining yourself for 48 hours. Let your truth stand alone.</li>
                <li><span class="step-label">Step 3: Grounding</span> नेचर isn't a luxury; walk barefoot on the earth for 10 minutes to clear the distortion.</li>
            </ul>`;
        }

        document.getElementById('resultContent').innerHTML = `
            <div class="result-title">${cat}</div>
            <div class="insight-card"><span class="step-label">The Seer's Advice</span><p>${insight}</p></div>
            <div style="margin-top:30px;"><span class="step-label">Your Immediate Roadmap</span>${stepsHtml}</div>
            <p style="margin-top:20px; font-style:italic; opacity:0.8; text-align:center;">Check your inbox. Your in-depth Sovereign Roadmap has been sent from <b>thewellnessforest@gmail.com</b>.</p>
        `;
    }
</script>
</body>
</html>
