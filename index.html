<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Sovereign Seer | Discovery Tool</title>
    <script type="text/javascript" src="https://cdn.jsdelivr.net/npm/@emailjs/browser@3/dist/email.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=Montserrat:wght@300;400;600&family=Pinyon+Script&display=swap" rel="stylesheet">
    <style>
        :root { --earth: #0d160f; --gold: #c2a878; --cream: #fefae0; }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: 'Montserrat', sans-serif; background-color: var(--earth); color: var(--cream); display: flex; align-items: center; justify-content: center; min-height: 100vh; overflow-x: hidden; }
        .v-brand { position: fixed; font-family: 'Pinyon Script'; color: var(--gold); opacity: 0.15; writing-mode: vertical-rl; font-size: 1.8rem; letter-spacing: 8px; pointer-events: none; }
        .left { left: 20px; transform: rotate(180deg); }
        .right { right: 20px; }
        .container { width: 92%; max-width: 700px; border: 1px solid rgba(194,168,120,0.2); padding: 60px 40px; background: rgba(255,255,255,0.01); backdrop-filter: blur(20px); position: relative; z-index: 10; }
        .quiz-title { font-size: 0.75rem; text-transform: uppercase; letter-spacing: 6px; color: var(--gold); text-align: center; display: block; margin-bottom: 40px; }
        h2 { font-family: 'Playfair Display', serif; font-size: 2rem; margin-bottom: 35px; text-align: center; font-weight: 400; line-height: 1.4; }
        .quiz-step { display: none; }
        .quiz-step.active { display: block; animation: fadeIn 0.8s ease; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
        .option-btn { display: block; width: 100%; padding: 22px 30px; margin-bottom: 15px; background: transparent; border: 1px solid rgba(194, 168, 120, 0.3); color: var(--cream); cursor: pointer; text-align: left; font-size: 1rem; transition: 0.3s; }
        .option-btn:hover { background: rgba(194, 168, 120, 0.08); border-color: var(--gold); padding-left: 40px; }
        input[type="email"] { width: 100%; padding: 22px; background: transparent; border: 1px solid var(--gold); color: white; margin-bottom: 25px; text-align: center; font-size: 1.1rem; }
        .action-btn { background: var(--gold); color: var(--earth); padding: 20px 40px; border: none; font-weight: 700; text-transform: uppercase; cursor: pointer; width: 100%; letter-spacing: 3px; transition: 0.3s; }
        .result-title { font-family: 'Pinyon Script', cursive; font-size: 3.5rem; color: var(--gold); text-align: center; margin-bottom: 15px; }
        .insight-card { background: rgba(194, 168, 120, 0.04); padding: 30px; margin: 25px 0; border-left: 4px solid var(--gold); text-align: left; }
        .label { color: var(--gold); font-weight: 600; text-transform: uppercase; font-size: 0.75rem; letter-spacing: 2px; display: block; margin-bottom: 10px; }
    </style>
</head>
<body>

<div class="v-brand left">SOVEREIGN SEER</div>
<div class="v-brand right">SOVEREIGN SEER</div>

<div class="container">
    <span class="quiz-title">Discovery Tool</span>
    <div id="quiz-container">
        <div class="quiz-step active" id="step1">
            <h2>When you walk into a room, what do you notice first?</h2>
            <button class="option-btn" onclick="nextStep(2, 2)">The "vibe" or underlying tension that no one is talking about.</button>
            <button class="option-btn" onclick="nextStep(2, 1)">The physical decor and where people are standing.</button>
            <button class="option-btn" onclick="nextStep(2, 0)">I'm usually focused on making sure everyone likes me.</button>
        </div>
        <div class="quiz-step" id="step2">
            <h2>In our framework, what does <b>Worth as a Frequency</b> mean to you?</h2>
            <button class="option-btn" onclick="nextStep(3, 2)">My value is inherent and radiates from within.</button>
            <button class="option-btn" onclick="nextStep(3, 1)">I should try to be "high-vibe" so good things happen.</button>
            <button class="option-btn" onclick="nextStep(3, 0)">I have to earn my worth through work and helping others.</button>
        </div>
        <div class="quiz-step" id="step3">
            <h2>How do you handle a "Mental Fog"—feeling stuck or unheard?</h2>
            <button class="option-btn" onclick="nextStep(4, 2)">I pause and look for the distortion causing the block.</button>
            <button class="option-btn" onclick="nextStep(4, 1)">I push through and work harder to get noticed.</button>
            <button class="option-btn" onclick="nextStep(4, 0)">I vent to others and hope it goes away.</button>
        </div>
        <div class="quiz-step" id="step4">
            <h2>The Lens is focusing...</h2>
            <input type="email" id="userEmail" placeholder="Enter your email address">
            <button class="action-btn" id="submitBtn" onclick="processFinal()">Reveal My Path</button>
        </div>
        <div class="quiz-step" id="results">
            <div id="resultContent"></div>
        </div>
    </div>
</div>

<script>
    // Verified Public Key from Screenshot 1000019828
    (function(){ emailjs.init("Mh_ZFUHh-VQRtdPpT"); })();

    let totalScore = 0;
    window.nextStep = function(stepNum, points) {
        totalScore += points;
        document.querySelectorAll('.quiz-step').forEach(s => s.classList.remove('active'));
        document.getElementById('step' + stepNum).classList.add('active');
    };

    window.processFinal = function() {
        const email = document.getElementById('userEmail').value;
        if(!email.includes('@')) { alert("Please provide a valid email."); return; }
        
        document.getElementById('submitBtn').innerText = "Tuning Frequency...";
        
        let category = "";
        let templateID = "";

        if (totalScore >= 5) {
            category = "The Emerging Sovereign";
            templateID = "template_ur0845p";
        } else if (totalScore >= 3) {
            category = "The Seeking Seer";
            templateID = "template_e5lnbx2";
        } else {
            category = "The Sheltered Seer";
            templateID = "template_lcjm8js";
        }

        // Verified Service ID from Screenshot 1000019826
        emailjs.send("service_0djjn9q", templateID, {
            to_email: email,
            category_result: category,
            reply_to: "thewellnessforest@gmail.com"
        }).then(function() {
            showFinalResults(category);
        }, function(err) {
            console.error("Email failed.", err);
            showFinalResults(category); 
        });
    };

    function showFinalResults(cat) {
        document.getElementById('step4').classList.remove('active');
        document.getElementById('results').classList.add('active');
        
        let advice = cat === "The Emerging Sovereign" ? "Stop fixing, start witnessing." : 
                     (cat === "The Seeking Seer" ? "Stop trading truth for peace." : "Recalibrate in silence.");

        document.getElementById('resultContent').innerHTML = `
            <div class="result-title">${cat}</div>
            <div class="insight-card">
                <span class="label">The Seer's Advice</span>
                <p>${advice}</p>
            </div>
            <p style="text-align:center; font-style:italic; opacity:0.8;">Your in-depth roadmap is on its way to your inbox.</p>
        `;
    }
</script>
</body>
</html>
